name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release -V

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure with Sanitizers
        run: cmake -B build -DENABLE_SANITIZERS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang

      - name: Build
        run: cmake --build build

      - name: Test with ASan + UBSan
        run: ctest --test-dir build --output-on-failure -V

  sandbox-seccomp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install libseccomp
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

      - name: Configure with seccomp
        run: cmake -B build -DZBC_USE_SECCOMP=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure -V

  # Cross-compile and run the on-target test suite under QEMU. Each
  # platform's test/target/platforms/<arch>/platform.cmake decides at
  # configure time whether its toolchain + emulator are available and
  # silently skips itself if not, so adding a new QEMU platform never
  # requires editing this job -- only the apt list, and only when a
  # genuinely new ISA family enters the matrix.
  qemu-target:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU + cross-compile toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-misc \
            qemu-system-arm \
            qemu-system-x86 \
            clang \
            lld

      - name: Configure with target tests
        run: cmake -B build -DZBC_TARGET_TESTS=ON

      - name: Build all available target ELFs
        run: cmake --build build

      - name: Run all QEMU target tests
        run: ctest --test-dir build -L qemu --output-on-failure
