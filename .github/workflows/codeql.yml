name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly. CodeQL's query packs get updated upstream; running on a
    # schedule surfaces new findings without waiting for an unrelated
    # push. Offset from the top of the hour to avoid the cron spike.
    - cron: '27 6 * * 1'

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (c-cpp)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          # security-extended adds higher-signal queries on top of the
          # default pack. The codebase is small enough that the extra
          # noise budget is manageable; dial back to "default" if the
          # results page gets too chatty.
          queries: security-extended

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
